version: '3.8'
name: next-cms

services:
  db:
    image: mysql:8.0
    container_name: cms_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cms_db
      MYSQL_USER: cms_user
      MYSQL_PASSWORD: cms_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    environment:
      DATABASE_URL: "mysql://cms_user:cms_password@db:3306/cms_db"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "pnpm prisma migrate deploy && pnpm prisma:seed"
    restart: "no"

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: cms_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ..:/app
      - /app/node_modules
      - /app/.next
      - ../public/uploads:/app/public/uploads
    environment:
      NODE_ENV: development
      DATABASE_URL: "mysql://cms_user:cms_password@db:3306/cms_db"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "local-dev-secret-key-change-in-production-xxxxx"
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: pnpm dev

volumes:
  mysql_data:
